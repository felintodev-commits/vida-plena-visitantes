<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Plena - Visitante</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3a7bd5;
    --blue-dark: #2c5fa8;
    --blue-light: #e8f0fb;
    --gray: #5a6472;
    --border: #dce4f0;
    --white: #ffffff;
    --shadow: 0 20px 60px rgba(42,80,160,0.18);
    --green: #25D366;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: linear-gradient(160deg, #2a50a0 0%, #3a7bd5 45%, #5b9de8 100%);
    padding: 12px 16px 24px;
    position: relative;
  }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    opacity: 0.08;
    background: white;
    pointer-events: none;
  }
  body::before { width: 500px; height: 500px; top: -150px; right: -150px; }
  body::after  { width: 350px; height: 350px; bottom: -100px; left: -100px; }

  .card {
    background: var(--white);
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
    animation: slideUp 0.5s ease;
    overflow: hidden;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .card-header {
    padding: 14px 24px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .logo-wrap img {
    width: 170px;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto 6px;
  }
  .welcome {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.5;
  }

  /* ── BODY ── */
  .card-body { padding: 16px 24px 12px; }

  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue-dark);
    margin-bottom: 5px;
  }
  .field label span {
    font-weight: 400;
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    color: #9aaabf;
    font-size: 10.5px;
  }
  .field input,
  .field textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Lato', sans-serif;
    color: #333;
    background: var(--blue-light);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
    resize: none;
  }
  .field textarea { min-height: 72px; line-height: 1.4; }
  .field input:focus,
  .field textarea:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(58,123,213,0.12);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 10px;
  }
  .divider span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
    white-space: nowrap;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── CHECKBOXES ── */
  .checks { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    background: var(--blue-light);
    transition: border-color 0.2s, background 0.2s;
    -webkit-user-select: none;
    user-select: none;
  }
  .check-item:hover { border-color: var(--blue); background: #ddeaf9; }
  .check-item input[type="checkbox"] { display: none; }
  .check-icon {
    width: 20px; height: 20px;
    border: 2px solid #b0bfd8;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    transition: background 0.2s, border-color 0.2s;
  }
  .check-icon svg { opacity: 0; transition: opacity 0.15s; }
  .check-item input:checked ~ .check-icon { background: var(--blue); border-color: var(--blue); }
  .check-item input:checked ~ .check-icon svg { opacity: 1; }
  .check-item input:checked ~ .check-text { color: var(--blue-dark); font-weight: 700; }
  .check-text { font-size: 13.5px; color: var(--gray); line-height: 1.3; transition: color 0.2s; }

  /* ── BOTÃO ── */
  .btn-wrap { margin-top: 14px; }
  button[type="submit"] {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--green) 0%, #1eba57 100%);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(37,211,102,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(37,211,102,0.45);
  }
  button[type="submit"]:active { transform: translateY(0); }
  .wa-icon { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── FOOTER ── */
  .card-footer {
    padding: 8px 24px 16px;
    text-align: center;
  }
  .card-footer p { font-size: 11.5px; color: #aab4c4; line-height: 1.5; }

  /* ── TELA DE SUCESSO ── */
  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    text-align: center;
    min-height: 360px;
    animation: slideUp 0.5s ease;
  }
  .success-screen.active { display: flex; }
  .success-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #25D366, #1eba57);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(37,211,102,0.4);
    animation: pop 0.4s ease 0.2s both;
  }
  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .success-icon svg { width: 40px; height: 40px; }
  .success-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a2e5a;
    margin-bottom: 10px;
  }
  .success-msg {
    font-size: 15px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .btn-nova {
    padding: 12px 28px;
    background: var(--blue-light);
    color: var(--blue-dark);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-nova:hover { background: #ddeaf9; }
</style>
</head>
<body>

      <p class="welcome">Seja muito bem-vindo! 🙏<br>Sua presença é muito importante para nós.</p>

    <div class="card-body">

      <div class="field">
        <label>Nome <span>(opcional)</span></label>
        <input type="text" id="nome" placeholder="Seu nome (opcional)" autofocus autocomplete="name">
      </div>

      <div class="field">
        <label>Telefone / WhatsApp <span>(opcional)</span></label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" inputmode="numeric" maxlength="15">
      </div>

      <div class="field">
        <label>Cidade / Bairro <span>(opcional)</span></label>
        <input type="text" id="cidade" placeholder="Sua cidade ou bairro">
      </div>

      <div class="field">
        <label>Pedido de Oração <span>(opcional)</span></label>
        <textarea id="oracao" placeholder="Deixe seu pedido de oração aqui..."></textarea>
      </div>

      <div class="divider"><span>Mais sobre sua visita</span></div>

      <div class="checks">
        <label class="check-item">
          <input type="checkbox" id="contato">
          <span class="check-icon">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="check-text">📞 Podemos entrar em contato com você?</span>

        <button type="submit" onclick="enviarWhats(event)">

    <p class="success-msg">Ficamos felizes em te receber 😊<br>Que Deus abençoe sua semana!</p>

<script>
  /* ── MÁSCARA TELEFONE ── */
  var telInput = document.getElementById('telefone');
  telInput.addEventListener('input', function () {
    var raw = this.value.replace(/\D/g, '').slice(0, 11);
    var v = '';
    if (raw.length === 0) {
      v = '';
    } else if (raw.length <= 2) {
      v = '(' + raw;
    } else if (raw.length <= 6) {
      v = '(' + raw.slice(0, 2) + ') ' + raw.slice(2);
    } else if (raw.length <= 10) {
      v = '(' + raw.slice(0, 2) + ') ' + raw.slice(2, 6) + '-' + raw.slice(6);
    } else {
      v = '(' + raw.slice(0, 2) + ') ' + raw.slice(2, 7) + '-' + raw.slice(7);
    }
    this.value = v;
  });

  /* ── ENVIO ── */
  function enviarWhats(e) {
    e.preventDefault();

    var nome     = document.getElementById('nome').value.trim()     || 'Não informado';
    var telefone = document.getElementById('telefone').value.trim() || 'Não informado';
    var cidade   = document.getElementById('cidade').value.trim()   || 'Não informado';
    var oracao   = document.getElementById('oracao').value.trim()   || '';
    var contato  = document.getElementById('contato').checked ? 'Sim' : 'Não';

    var now = new Date();
    var dataFormatada = now.toLocaleDateString('pt-BR');
    var horaFormatada = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    var msg =
      '\uD83D\uDE4F *Igreja Batista Vida Plena*\n' +
      'Novo registro de visitante:\n\n' +
      '\uD83D\uDCC5 *Data:* ' + dataFormatada + '\n' +
      '\u23F0 *Hora:* ' + horaFormatada + '\n\n' +
      '\uD83D\uDC64 *Nome:* ' + nome + '\n' +
      '\uD83D\uDCF1 *Telefone:* ' + telefone + '\n' +
      '\uD83D\uDCCD *Cidade / Bairro:* ' + cidade + '\n' +
      '\uD83D\uDCDE *Permite contato:* ' + contato;

    if (oracao) {
      msg += '\n\n\uD83D\uDE4F *Pedido de Oracao:*\n' + oracao;
    }

    /* Mostra tela de sucesso ANTES de abrir WhatsApp */
    mostrarSucesso();

    setTimeout(function () {
      window.location.href = 'https://wa.me/5569992418676?text=' + encodeURIComponent(msg);
    }, 800);
  }

  function mostrarSucesso() {
    document.getElementById('form-view').style.display = 'none';
    var s = document.getElementById('success-view');
    s.classList.add('active');
  }

  function reiniciar() {
    document.getElementById('nome').value = '';
    document.getElementById('telefone').value = '';
    document.getElementById('cidade').value = '';
    document.getElementById('oracao').value = '';
    document.getElementById('contato').checked = false;

    document.getElementById('success-view').classList.remove('active');
    document.getElementById('form-view').style.display = '';
    document.getElementById('nome').focus();
  }
</script>
</body>
</html>
