<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Plena - Visitante</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #5f5fd6, #4a90e2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #fff;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}

.logo img {
  width: 80px;
}

h2 {
  text-align: center;
  margin-bottom: 5px;
}

.sub {
  text-align: center;
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.checkbox-group {
  margin: 15px 0;
}

.checkbox-item {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  gap: 10px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  background: #4a90e2;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #357abd;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: #777;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">

  <div class="logo">
    <!-- Se tiver logo, substitua o src -->
    <img src="https://via.placeholder.com/80" alt="Logo Igreja">
  </div>

  <h2>Igreja Batista Vida Plena</h2>
  <p class="sub">Seja muito bem-vindo! Sua presença é muito importante para nós.</p>

  <form onsubmit="enviarWhats(event)">
    <input type="text" id="nome" placeholder="Nome (opcional)">
    <input type="text" id="telefone" placeholder="Telefone (opcional)">
    <input type="text" id="cidade" placeholder="Cidade/Bairro (opcional)">

    <div class="checkbox-group">
      <label class="checkbox-item">
        <input type="checkbox" id="primeira">
        Primeira vez aqui?
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="visita">
        Deseja receber uma visita?
      </label>
    </div>

    <button type="submit">Enviar</button>
  </form>

  <div class="footer">
    Preencha apenas se se sentir à vontade 😊
  </div>

</div>

<script>
function enviarWhats(e){
  e.preventDefault();

  let nome = document.getElementById('nome').value;
  let telefone = document.getElementById('telefone').value;
  let cidade = document.getElementById('cidade').value;
  let primeira = document.getElementById('primeira').checked ? 'Sim' : 'Não';
  let visita = document.getElementById('visita').checked ? 'Sim' : 'Não';

  let msg = `Novo visitante - Igreja Batista Vida Plena:

Nome: ${nome}
Telefone: ${telefone}
Cidade/Bairro: ${cidade}
Primeira vez: ${primeira}
Deseja visita: ${visita}`;

  let url = `https://wa.me/5569992418676?text=${encodeURIComponent(msg)}`;

  window.location.href = url;
}
</script>

</body>
</html>
