<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Plena - Visitante</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #3a7bd5;
    --blue-dark: #2c5fa8;
    --blue-light: #e8f0fb;
    --gray: #5a6472;
    --border: #dce4f0;
    --white: #ffffff;
    --shadow: 0 20px 60px rgba(42,80,160,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(160deg, #2a50a0 0%, #3a7bd5 45%, #5b9de8 100%);
    padding: 16px;
    overflow: hidden;
    position: relative;
  }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    opacity: 0.08;
    background: white;
    pointer-events: none;
  }
  body::before { width: 500px; height: 500px; top: -150px; right: -150px; }
  body::after  { width: 350px; height: 350px; bottom: -100px; left: -100px; }

  .card {
    background: var(--white);
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    overflow-x: hidden;
    box-shadow: var(--shadow);
    animation: slideUp 0.5s ease;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card::-webkit-scrollbar { display: none; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 20px 24px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .logo-wrap img {
    width: 190px;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto 8px;
  }
  .welcome {
    font-size: 13.5px;
    color: var(--gray);
    line-height: 1.6;
  }

  .card-body { padding: 20px 24px 16px; }

  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue-dark);
    margin-bottom: 5px;
  }
  .field label span {
    font-weight: 400;
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    color: #9aaabf;
    font-size: 10.5px;
  }
  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Lato', sans-serif;
    color: #333;
    background: var(--blue-light);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .field input:focus {
    border-color: var(--blue);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(58,123,213,0.12);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 10px;
  }
  .divider span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray);
    white-space: nowrap;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .checks { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    background: var(--blue-light);
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }
  .check-item:hover { border-color: var(--blue); background: #ddeaf9; }
  .check-item input[type="checkbox"] { display: none; }
  .check-icon {
    width: 20px; height: 20px;
    border: 2px solid #b0bfd8;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    transition: background 0.2s, border-color 0.2s;
  }
  .check-icon svg { opacity: 0; transition: opacity 0.15s; }
  .check-item input:checked ~ .check-icon { background: var(--blue); border-color: var(--blue); }
  .check-item input:checked ~ .check-icon svg { opacity: 1; }
  .check-item input:checked ~ .check-text { color: var(--blue-dark); font-weight: 700; }
  .check-text { font-size: 13.5px; color: var(--gray); line-height: 1.3; transition: color 0.2s; }

  .btn-wrap { margin-top: 14px; }
  button[type="submit"] {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(42,80,160,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(42,80,160,0.38);
  }
  button[type="submit"]:active { transform: translateY(0); }
  .wa-icon { width: 20px; height: 20px; flex-shrink: 0; }

  .card-footer {
    padding: 10px 24px 18px;
    text-align: center;
  }
  .card-footer p { font-size: 12px; color: #aab4c4; }
</style>
</head>

<script>
function enviarWhats(e) {
  e.preventDefault();
  const nome     = document.getElementById('nome').value.trim() || 'Não informado';

  const cidade   = document.getElementById('cidade').value.trim() || 'Não informado';
  const primeira = document.getElementById('primeira').checked ? 'Sim ✅' : 'Não';
  const visita   = document.getElementById('visita').checked   ? 'Sim ✅' : 'Não';
  const msg = `🙏 *Igreja Batista Vida Plena*\nNovo registro de visitante:\n\n👤 *Nome:* ${nome}\n📱 *Telefone:* ${telefone}\n📍 *Endereço:* ${cidade}\n✨ *Primeira visita:* ${primeira}\n🏠 *Deseja receber visita:* ${visita}`;
  window.location.href = `https://wa.me/5569992418676?text=${encodeURIComponent(msg)}`;
}
</script>
